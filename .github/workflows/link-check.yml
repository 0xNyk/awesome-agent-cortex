name: Link Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/link-check.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.github/workflows/link-check.yml'

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: >-
            --verbose
            --no-progress
            --timeout 20
            --max-retries 2
            --retry-wait-time 2
            --exclude 'https://www.reddit.com/.*'
            --exclude 'https://defillama.com/.*'
            --exclude 'https://www.coinbase.com/.*'
            --exclude 'https://smithery.ai.*'
            --exclude 'https://cursor.directory.*'
            --exclude 'https://spec.modelcontextprotocol.io.*'
            --exclude 'https://platform.openai.com/docs/.*'
            README.md guides/**/*.md claude/**/*.md hermes/**/*.md codex/**/*.md cursorrules/**/*.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md SUPPORT.md
          fail: true
